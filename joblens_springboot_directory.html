function iconChar(icon, name) {
  if (icon === 'f') return '<i class="ti ti-folder" aria-hidden="true" style="color:#EF9F27;font-size:14px"></i>';
  if (name.endsWith('.java')) return '<i class="ti ti-coffee" aria-hidden="true" style="color:#378ADD;font-size:14px"></i>';
  if (name.endsWith('.yml') || name.endsWith('.yaml') || name.endsWith('.sql')) return '<i class="ti ti-settings" aria-hidden="true" style="color:#854F0B;font-size:14px"></i>';
  if (name.endsWith('.html')) return '<i class="ti ti-mail" aria-hidden="true" style="color:#D4537E;font-size:14px"></i>';
  if (name.endsWith('Test.java')) return '<i class="ti ti-check" aria-hidden="true" style="color:#639922;font-size:14px"></i>';
  if (name === 'README.md') return '<i class="ti ti-file-text" aria-hidden="true" style="font-size:14px"></i>';
  if (name === 'pom.xml' || name === 'Dockerfile' || name === '.env.example') return '<i class="ti ti-settings" aria-hidden="true" style="color:#854F0B;font-size:14px"></i>';
  return '<i class="ti ti-file" aria-hidden="true" style="font-size:14px"></i>';
}

function buildTree(containerId, data) {
  const container = document.getElementById(containerId);
  const tooltip = document.getElementById('tooltip');
  data.forEach(n => {
    const row = document.createElement('div');
    row.className = 'row';
    const indentStr = '  '.repeat(n.d);
    const connector = n.d > 0 ? (n.icon === 'f' ? '├─ ' : '│  ').replace('│  ','├─ ') : '';
    let inner = `<span class="indent">${indentStr}${n.d > 0 ? '├─ ' : ''}</span>`;
    inner += `<span class="icon">${iconChar(n.icon, n.name)}</span>`;
    inner += `<span class="name ${n.cls||''}">${n.name}</span>`;
    if (n.badge) inner += `<span class="badge ${n.bc||''}">${n.badge}</span>`;
    if (n.desc) inner += `<span class="desc">${n.desc}</span>`;
    row.innerHTML = inner;
    if (n.tip) {
      row.addEventListener('mouseenter', e => {
        tooltip.textContent = n.tip;
        tooltip.classList.add('show');
        const rect = row.getBoundingClientRect();
        const wrapRect = row.closest('.wrap').getBoundingClientRect();
        tooltip.style.top = (rect.bottom - wrapRect.top + 4) + 'px';
        tooltip.style.left = Math.min(rect.left - wrapRect.left, wrapRect.width - 290) + 'px';
      });
      row.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
    }
    container.appendChild(row);
  });
}
